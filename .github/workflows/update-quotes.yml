name: Update market quotes

# Refresh data/quotes.json every 20 minutes during US market hours
# (13:00-21:00 UTC covers 9am-5pm ET), weekdays only, plus manual runs.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 13-21 * * 1-5"

permissions:
  contents: write
  issues: write

concurrency:
  group: quotes
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest quotes
        run: python3 scripts/update_quotes.py

      - name: Commit if changed
        run: |
          git add data/quotes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update market quotes [skip ci]"
          git push

      # M1 corrective action: a silent pipeline is the worst failure mode.
      # On any failed run, open an issue so the repo owner gets an email.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "Quotes pipeline failed ($(date -u +%Y-%m-%d))" \
            --body "A scheduled market-data update failed. Run log: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            || echo "issue creation failed; see run log"
